# ===========================================
# Nginx config cho betonabi.com
# Next.js + SSL + www redirect
# ===========================================

# Redirect non-www -> www
server {
    listen 80;
    listen 443 ssl;
    server_name betonabi.com;

    ssl_certificate /etc/letsencrypt/live/betonabi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/betonabi.com/privkey.pem;

    return 301 https://www.betonabi.com$request_uri;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name www.betonabi.com;
    return 301 https://www.betonabi.com$request_uri;
}

# Main server block - Next.js
server {
    listen 443 ssl http2;
    server_name www.betonabi.com;

    ssl_certificate /etc/letsencrypt/live/betonabi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/betonabi.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Next.js static files - cached forever
    location /_next/static/ {
        alias /var/www/betonabi-nextjs/.next/static/;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public files (images, favicon, robots.txt)
    location /public/ {
        alias /var/www/betonabi-nextjs/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        root /var/www/betonabi-nextjs/public;
        expires 30d;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        root /var/www/betonabi-nextjs/public;
        expires 7d;
        access_log off;
    }

    # Sitemap
    location = /sitemap.xml {
        root /var/www/betonabi-nextjs/public;
        expires 1d;
        access_log off;
    }

    # Proxy all other requests to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size
    client_max_body_size 100M;
}

